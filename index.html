<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝くじチェッカー</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🎯 宝くじチェッカー</h1>

    <label for="lottery">対象</label>
    <select id="lottery"></select>

    <label for="numbers">番号を入力（半角数字）</label>
<div id="tickets">

    <div class="ticket">
        <p>1枚目</p>

        <input class="group" type="text" placeholder="01" maxlength="2" inputmode="numeric">
    <input class="number" type="text" placeholder="111111" maxlength="6" inputmode="numeric">

    </div>

</div>

<button id="addButton">＋追加</button>

    <button id="checkButton">判定する</button>

    <hr>

    <h2>結果</h2>

    <div id="result">
        ここに結果が表示されます
    </div>

    <script src="script.js"></script>

</body>
</html>
