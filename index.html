<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝くじチェッカー</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>
    <span class="material-symbols-outlined">confirmation_number</span>
    宝くじチェッカー
</h1>

    <label for="lottery">対象</label>
    <select id="lottery"></select>

    <label for="numbers">番号を入力（半角数字）</label>

<div id="tickets"></div>

<h3>連番入力</h3>

<div class="serial-input">

    <input id="serialGroup"
           type="text"
           placeholder="組"
           maxlength="2"
           inputmode="numeric">

    <input id="serialStart"
           type="text"
           placeholder="開始番号"
           maxlength="6"
           inputmode="numeric">

    <input id="serialCount"
           type="number"
           placeholder="枚数"
           min="1">

</div>

<button id="serialButton">
    <span class="material-symbols-outlined">library_add</span>
    連番生成
</button>

<button id="addButton">
    <span class="material-symbols-outlined">add</span>
    追加
</button>

    <button id="checkButton">
    <span class="material-symbols-outlined">check_circle</span>
    判定する
</button>

    <hr>

    <h2>結果</h2>

    <div id="result">
        ここに結果が表示されます
    </div>

    <script src="script.js"></script>

</body>
</html>
